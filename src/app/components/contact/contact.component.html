<section id="contact" class="section-container text-center py-20">

  <!-- Heading -->
  <h2 class="section-title justify-center" data-aos="fade-up">
    What's Next?
  </h2>

  <h3 class="text-3xl sm:text-4xl md:text-5xl font-bold text-lightest-slate mb-6"
      data-aos="fade-up" data-aos-delay="100">
    Get In Touch
  </h3>

  <p class="text-slate text-base sm:text-lg max-w-xl mx-auto mb-10"
     data-aos="fade-up" data-aos-delay="200">
    I'm open to opportunities and collaborations. Feel free to reach out anytime!
  </p>

  <!-- Contact Info -->
  <div class="flex flex-col items-center gap-3 mb-8 text-slate">

    <!-- Email -->
    <p>
      📧 
      <a href="mailto:adhikarideepak719@gmail.com" 
         class="hover:text-green-400 transition">
         adhikarideepak719&#64;gmail.com
      </a>
    </p>

    <!-- Phone -->
    <p>
      📱 
      <a href="tel:+919876543210" 
         class="hover:text-green-400 transition">
         +91 6399851956
      </a>
    </p>

  </div>

  <!-- Social Buttons -->
  <div class="flex justify-center gap-6 mb-12">

    <!-- GitHub Button -->
    <a href="https://github.com/DeepakAd12" target="_blank"
       class="px-5 py-2 border border-green-400 text-green-400 rounded 
              hover:bg-green-400/10 hover:shadow-[0_0_10px_#4ade80] 
              transition duration-300">
      GitHub
    </a>

    <!-- LinkedIn Button -->
    <a href="https://www.linkedin.com/in/deepak-adhikari-32a86a326/" target="_blank"
       class="px-5 py-2 border border-green-400 text-green-400 rounded 
              hover:bg-green-400/10 hover:shadow-[0_0_10px_#4ade80] 
              transition duration-300">
      LinkedIn
    </a>

  </div>

  <!-- Contact Form -->
  <form [formGroup]="contactForm" (ngSubmit)="onSubmit()"
        class="max-w-xl mx-auto space-y-5"
        data-aos="fade-up" data-aos-delay="300">

    <!-- Name -->
    <input formControlName="name" type="text" placeholder="Your Name"
      class="w-full px-4 py-3 border border-lightest-navy rounded bg-transparent 
             focus:border-green-400 focus:outline-none text-slate" />

    <!-- Email -->
    <input formControlName="email" type="email" placeholder="Your Email"
      class="w-full px-4 py-3 border border-lightest-navy rounded bg-transparent 
             focus:border-green-400 focus:outline-none text-slate" />

    <!-- Message -->
    <textarea formControlName="message" rows="4" placeholder="Your Message"
      class="w-full px-4 py-3 border border-lightest-navy rounded bg-transparent 
             focus:border-green-400 focus:outline-none text-slate resize-none"></textarea>

    <!-- Button -->
   <button type="submit"
    [disabled]="isMailSending || contactForm.invalid"
  class="w-full px-8 py-3 border border-green-400 text-green-400 rounded 
         hover:bg-green-400/10 transition duration-300 
         flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">

  <!-- Spinner -->
  <svg *ngIf="isMailSending"
       class="w-4 h-4 animate-spin"
       viewBox="0 0 24 24"
       fill="none">
    <circle cx="12" cy="12" r="10"
            stroke="currentColor"
            stroke-width="3"
            class="opacity-25"></circle>
    <path d="M4 12a8 8 0 018-8"
          stroke="currentColor"
          stroke-width="3"
          class="opacity-75"></path>
  </svg>

  <!-- Text -->
  <span *ngIf="!isMailSending">Say Hello 🚀</span>
  <span *ngIf="isMailSending">Sending...</span>

</button>

    <!-- Status Message -->
    <p *ngIf="uploadMessage"
       [class]="'text-center font-medium ' + (isError ? 'text-red-500' : 'text-green-500')">
      {{ uploadMessage }}
    </p>

  </form>

</section>
